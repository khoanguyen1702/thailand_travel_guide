<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thailand Trip</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Language Toggle -->
    <div class="language-toggle">
        <button class="lang-btn active" data-lang="en" title="English">🇺🇸</button>
        <button class="lang-btn" data-lang="vi" title="Tiếng Việt">🇻🇳</button>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 data-en="Thailand Trip" data-vi="Chuyến Du Lịch Thái Lan">Thailand Trip</h1>
            <p class="subtitle" data-en="April 24 - 29, 2026" data-vi="24 - 29 Tháng Tư, 2026">April 24 - 29, 2026</p>
        </header>

        <!-- Day Navigation -->
        <section class="day-nav-section">
            <div class="day-nav">
                <div class="day-nav-item active" data-day="1" onclick="selectDay(1)">
                    <button class="day-nav-btn day-1">
                        <span class="day-num">1</span>
                        <span class="day-label">DAY</span>
                    </button>
                    <span class="day-date">Apr 24</span>
                </div>
                <div class="day-nav-item" data-day="2" onclick="selectDay(2)">
                    <button class="day-nav-btn day-2">
                        <span class="day-num">2</span>
                        <span class="day-label">DAY</span>
                    </button>
                    <span class="day-date">Apr 25</span>
                </div>
                <div class="day-nav-item" data-day="3" onclick="selectDay(3)">
                    <button class="day-nav-btn day-3">
                        <span class="day-num">3</span>
                        <span class="day-label">DAY</span>
                    </button>
                    <span class="day-date">Apr 26</span>
                </div>
                <div class="day-nav-item" data-day="4" onclick="selectDay(4)">
                    <button class="day-nav-btn day-4">
                        <span class="day-num">4</span>
                        <span class="day-label">DAY</span>
                    </button>
                    <span class="day-date">Apr 27</span>
                </div>
                <div class="day-nav-item" data-day="5" onclick="selectDay(5)">
                    <button class="day-nav-btn day-5">
                        <span class="day-num">5</span>
                        <span class="day-label">DAY</span>
                    </button>
                    <span class="day-date">Apr 28</span>
                </div>
                <div class="day-nav-item" data-day="6" onclick="selectDay(6)">
                    <button class="day-nav-btn day-6">
                        <span class="day-num">6</span>
                        <span class="day-label">DAY</span>
                    </button>
                    <span class="day-date">Apr 29</span>
                </div>
            </div>
        </section>
        <!-- Day Content -->
        <section class="day-content">
            <div class="day-header">
                <h2 id="current-day-title" data-en="Day 1 - April 24" data-vi="Ngày 1 - 24 Tháng Tư">Day 1 - April 24</h2>
                <button class="btn-payment" onclick="openPaymentCalculator()" data-en="💰 Payment Calculator" data-vi="💰 Tính Toán Chi Phí">💰 Payment Calculator</button>
            </div>

            <!-- Payment Calculator Modal -->
            <div id="payment-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <span class="close" onclick="closePaymentCalculator()">&times;</span>
                    <h2 data-en="Payment Calculator" data-vi="Tính Toán Chi Phí">Payment Calculator</h2>
                    
                    <div class="payment-inputs">
                        <div class="input-group">
                            <label data-en="Payer Name:" data-vi="Tên Người Chi Tiền:">Payer Name:</label>
                            <input type="text" id="payer-name" placeholder="Enter name">
                        </div>
                        <div class="input-group">
                            <label data-en="Amount Paid:" data-vi="Số Tiền Đã Chi:">Amount Paid:</label>
                            <input type="number" id="amount-paid" placeholder="0" min="0">
                        </div>
                        <div class="input-group">
                            <label data-en="Total Users:" data-vi="Tổng Số Người:">Total Users:</label>
                            <input type="number" id="total-users" placeholder="0" min="1" value="1">
                        </div>
                    </div>

                    <div class="payment-results">
                        <div class="result-row">
                            <span data-en="Per Person:" data-vi="Trên Mỗi Người:">Per Person:</span>
                            <span id="per-person">0 ₫</span>
                        </div>
                        <div class="result-row">
                            <span data-en="For 2 People:" data-vi="Cho 2 Người:">For 2 People:</span>
                            <span id="for-two">0 ₫</span>
                        </div>
                    </div>

                    <div class="payment-history" id="payment-history"></div>
                </div>
            </div>

            <!-- Activities Content -->
            <div class="activities-content" id="activities-content">
                <!-- Will be populated by JavaScript -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
